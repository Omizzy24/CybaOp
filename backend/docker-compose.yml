version: "3.8"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: cybaop
      POSTGRES_PASSWORD: cybaop
      POSTGRES_DB: cybaop
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cybaop"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://cybaop:cybaop@postgres:5432/cybaop
    ports:
      - "8000:8000"
    command: >
      uvicorn src.api.app:app
      --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
